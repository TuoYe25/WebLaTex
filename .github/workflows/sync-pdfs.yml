name: Sync PDFs to Homepage
on:
  push:
    paths:
      - 'PDF/Edwin_CV.pdf'
      - 'PDF/梅越_简历.pdf'
    branches:
      - main
  workflow_dispatch:  # 添加手动触发支持
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 在workflow级别设置Node.js 24，避免弃用警告

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout WebLaTex repo
        uses: actions/checkout@v4
        with:
          path: weblatex
          fetch-depth: 1
      
      - name: Checkout Homepage repo
        uses: actions/checkout@v4
        with:
          repository: TuoYe25/tuoye25.github.io
          path: homepage
          token: ${{ secrets.PERSONAL_TOKEN }}  # 使用Fine-Grained Token
      
      - name: Create docs directory
        run: mkdir -p homepage/docs
      
      - name: Copy PDF files
        run: |
          cp weblatex/PDF/Edwin_CV.pdf homepage/docs/
          cp weblatex/PDF/梅越_简历.pdf homepage/docs/
      
      - name: Commit and push changes
        working-directory: homepage
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/
          if git diff --staged --quiet;
          then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Sync latest PDFs from WebLaTex"
          git push